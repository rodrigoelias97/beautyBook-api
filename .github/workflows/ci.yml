name: BeautyBook API CI

on:
  workflow_dispatch:
    inputs:
      performance_suite:
        description: Selecione o cenario de performance manual
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike
          - all
  pull_request:
  push:
    branches:
      - main

jobs:
  api-tests:
    name: Build and Test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run API tests
        run: npm test

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start API
        run: |
          npm start > beautybook.log 2>&1 &

      - name: Wait for API healthcheck
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat beautybook.log
          exit 1

      - name: Run performance smoke test
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.performance_suite == 'smoke' || github.event.inputs.performance_suite == 'all'
        run: npm run test:performance:smoke

      - name: Run performance load test
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.performance_suite == 'load' || github.event.inputs.performance_suite == 'all')
        run: npm run test:performance:load

      - name: Run performance stress test
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.performance_suite == 'stress' || github.event.inputs.performance_suite == 'all')
        run: npm run test:performance:stress

      - name: Run performance spike test
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.performance_suite == 'spike' || github.event.inputs.performance_suite == 'all')
        run: npm run test:performance:spike
